<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        h1 { color: #ff6b6b; }
        a.button {
            background: #1dd1a1;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px;
            display: inline-block;
        }
        a.button:hover { background: #10ac84; }
        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Hi ZEJAY POGI, Your App is Running!</h1>
    <p>Here is the list of students:</p>
    <ul>
        {% for student in students %}
            <li>{{ student.name }} - Grade {{ student.grade }}, Section {{ student.section }}</li>
        {% endfor %}
    </ul>
    <a class="button" href="{{ url_for('add_student_form') }}">Add New Student</a>
</body>
</html>
